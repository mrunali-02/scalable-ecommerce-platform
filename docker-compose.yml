version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ecommerce-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ecommerce-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  user-service:
    build:
      context: ./gateway/services/user-service
    container_name: user-service
    env_file:
      - ./gateway/services/user-service/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  product-service:
    build:
      context: ./gateway/services/product-service
    container_name: product-service
    env_file:
      - ./gateway/services/product-service/.env
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis

  cart-service:
    build:
      context: ./gateway/services/cart-service
    container_name: cart-service
    env_file:
      - ./gateway/services/cart-service/.env
    ports:
      - "8002:8002"
    depends_on:
      - postgres

  order-service:
    build:
      context: ./gateway/services/order-service
    container_name: order-service
    env_file:
      - ./gateway/services/order-service/.env
    ports:
      - "8003:8003"
    depends_on:
      - postgres

  payment-service:
    build:
      context: ./gateway/services/payment-service
    container_name: payment-service
    env_file:
      - ./gateway/services/payment-service/.env
    ports:
      - "8004:8004"
    depends_on:
      - postgres

  notification-service:
    build:
      context: ./gateway/services/notification-service
    container_name: notification-service
    env_file:
      - ./gateway/services/notification-service/.env
    ports:
      - "8005:8005"
    depends_on:
      - postgres

  api-gateway:
    build:
      context: ./gateway/services/api-gateway
    container_name: api-gateway
    env_file:
      - ./gateway/services/api-gateway/.env
    ports:
      - "8088:8080"
    depends_on:
      - user-service
      - product-service
      - cart-service
      - order-service
      - payment-service
      - notification-service

volumes:
  postgres-data: