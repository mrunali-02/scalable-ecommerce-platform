# docker-compose.yml - to be filled later
version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: ecommerce-postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: userdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
